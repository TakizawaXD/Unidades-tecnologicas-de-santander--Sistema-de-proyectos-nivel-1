<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - UTS Plataforma Institucional</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="auth-page">
    <div class="auth-card">
        <img src="https://www.uts.edu.co/sitio/wp-content/uploads/2019/10/Logo-UTS-1.png" alt="UTS Logo" class="auth-logo">
        <h1>Únete a la Comunidad UTS</h1>
        <p>Crea tu cuenta para gestionar tus proyectos académicos.</p>
        
        <form id="registerForm">
            <div class="form-group">
                <label for="reg-name"><i class="fas fa-user"></i> Nombre Completo</label>
                <input type="text" id="reg-name" placeholder="Tu nombre completo" required>
            </div>
            <div class="form-group">
                <label for="reg-email"><i class="fas fa-envelope"></i> Correo Institucional</label>
                <input type="email" id="reg-email" placeholder="estudiante@uts.edu.co" required>
            </div>
            <div class="form-group">
                <label for="reg-career"><i class="fas fa-graduation-cap"></i> Carrera</label>
                <select id="reg-career">
                    <option value="Ingeniería de Sistemas">Ingeniería de Sistemas</option>
                    <option value="Ingeniería Informática">Ingeniería Informática</option>
                    <option value="Desarrollo de Software">Desarrollo de Software</option>
                    <option value="Ingeniería Electrónica">Ingeniería Electrónica</option>
                </select>
            </div>
            <div class="form-group">
                <label for="reg-pass"><i class="fas fa-lock"></i> Contraseña</label>
                <input type="password" id="reg-pass" placeholder="Mínimo 8 caracteres" required>
            </div>
            <button type="submit" class="btn-uts">Crear Cuenta</button>
        </form>
        
        <div style="margin-top: 25px; font-size: 14px;">
            <span style="color: var(--uts-text-muted);">¿Ya tienes cuenta?</span>
            <a href="login.html" style="color: var(--uts-blue); font-weight: 600; text-decoration: none;">Inicia Sesión</a>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
