<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - UTS Plataforma Institucional</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
</head>
<body class="auth-page">
    <div class="auth-card" style="position: relative; overflow: hidden;">
        <!-- decorative background -->
        <div style="position: absolute; top: -50px; right: -50px; width: 150px; height: 150px; background: rgba(0, 141, 62, 0.1); border-radius: 50%;"></div>
        <div style="position: absolute; bottom: -50px; left: -50px; width: 100px; height: 100px; background: rgba(0, 74, 135, 0.1); border-radius: 50%;"></div>

        <img src="https://www.uts.edu.co/sitio/wp-content/uploads/2019/10/Logo-UTS-1.png" alt="UTS Logo" class="auth-logo" style="position: relative; z-index: 1;">
        <h1 style="position: relative; z-index: 1; font-weight: 800;">Bienvenido al Portal UTS</h1>
        <p style="position: relative; z-index: 1;">Gestión de Proyectos y Seguimiento de Graduación</p>
        
        <form id="loginForm" style="position: relative; z-index: 1;">
            <div class="form-group">
                <label for="email"><i class="fas fa-envelope"></i> Correo Institucional</label>
                <input type="email" id="email" placeholder="nombre@uts.edu.co" autocomplete="email" required>
            </div>
            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i> Contraseña</label>
                <input type="password" id="password" placeholder="********" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn-uts" style="margin-top: 10px;">Iniciar Sesión</button>
        </form>
        
        <div style="margin-top: 25px; font-size: 14px; position: relative; z-index: 1;">
            <span style="color: var(--uts-text-muted);">¿No tienes cuenta?</span>
            <a href="register.html" style="color: var(--uts-blue); font-weight: 700; text-decoration: none;">Regístrate aquí</a>
        </div>
    </div>

    <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script type="module" src="../js/app.js"></script>
</body>
</html>
