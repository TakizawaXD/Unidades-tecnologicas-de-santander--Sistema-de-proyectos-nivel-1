<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - UTS Plataforma Institucional</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="auth-page">
    <div class="auth-card">
        <img src="https://www.uts.edu.co/sitio/wp-content/uploads/2019/10/Logo-UTS-1.png" alt="UTS Logo" class="auth-logo">
        <h1>Bienvenido al Portal UTS</h1>
        <p>Gestión de Proyectos y Seguimiento de Graduación</p>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="email"><i class="fas fa-envelope"></i> Correo Institucional</label>
                <input type="email" id="email" placeholder="nombre@uts.edu.co" required>
            </div>
            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i> Contraseña</label>
                <input type="password" id="password" placeholder="********" required>
            </div>
            <button type="submit" class="btn-uts">Iniciar Sesión</button>
        </form>
        
        <div style="margin-top: 25px; font-size: 14px;">
            <span style="color: var(--uts-text-muted);">¿No tienes cuenta?</span>
            <a href="register.html" style="color: var(--uts-blue); font-weight: 600; text-decoration: none;">Regístrate aquí</a>
        </div>
    </div>

    <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
